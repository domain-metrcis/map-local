name: Maps Checker VNC

on:
  workflow_dispatch:
    inputs:
      workers:
        description: 'Number of parallel browser instances'
        required: false
        default: '1'

env:
  DISPLAY: ":1"
  VNC_PORT: 5901
  NOVNC_PORT: 6080
  VNC_PASSWORD: "botxbyte123"
  MAP_DIR: "/home/runner/map-local"
  MAP_WORKERS: ${{ github.event.inputs.workers || '1' }}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Clone map-local code
        run: |
          echo "Cloning map-local repository..."
          rm -rf "$MAP_DIR"
          # Authenticate with the workflow's built-in token so the private repo
          # can be cloned on the runner (no Username/Password prompt).
          git clone --depth 1 \
            "https://x-access-token:${{ github.token }}@github.com/domain-metrcis/map-local.git" \
            "$MAP_DIR"
          echo "✅ map-local cloned to $MAP_DIR"
          ls -la "$MAP_DIR"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Optimize APT mirror
        timeout-minutes: 3
        run: |
          echo "Optimizing APT mirror and network settings..."
          sudo systemctl stop unattended-upgrades 2>/dev/null || true
          sudo killall -9 unattended-upgrades 2>/dev/null || true

          cat << 'EOF' | sudo tee /etc/apt/apt.conf.d/99ci-network >/dev/null
          Acquire::Retries "6";
          Acquire::http::Timeout "15";
          Acquire::https::Timeout "15";
          Acquire::ForceIPv4 "true";
          EOF

          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu|mirror://mirrors.ubuntu.com/mirrors.txt|g' /etc/apt/sources.list.d/ubuntu.sources
            sudo sed -i 's|https://azure.archive.ubuntu.com/ubuntu|mirror://mirrors.ubuntu.com/mirrors.txt|g' /etc/apt/sources.list.d/ubuntu.sources
          fi
          if [ -f /etc/apt/sources.list ]; then
            sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu|mirror://mirrors.ubuntu.com/mirrors.txt|g' /etc/apt/sources.list
            sudo sed -i 's|https://azure.archive.ubuntu.com/ubuntu|mirror://mirrors.ubuntu.com/mirrors.txt|g' /etc/apt/sources.list
          fi

          sudo apt-get -o Acquire::Retries=6 update -q
          echo "✅ APT optimization complete"

      - name: Install Desktop Environment (XFCE + VNC)
        timeout-minutes: 18
        run: |
          echo "Installing XFCE desktop and TurboVNC..."
          sudo systemctl stop unattended-upgrades 2>/dev/null || true
          sudo killall -9 unattended-upgrades 2>/dev/null || true

          for i in $(seq 1 12); do
            if ! sudo fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; then break; fi
            echo "Waiting for dpkg lock... ($i/12)"; sleep 5
          done

          mkdir -p ~/cached-debs

          (wget -q -O ~/cached-debs/turbovnc_2.2.5_amd64.deb \
            https://phoenixnap.dl.sourceforge.net/project/turbovnc/2.2.5/turbovnc_2.2.5_amd64.deb && echo "✅ TurboVNC downloaded") &
          PID_VNC=$!
          (cd ~ && git clone --depth 1 https://github.com/novnc/noVNC.git && \
            cd noVNC && git clone --depth 1 https://github.com/novnc/websockify.git && echo "✅ noVNC cloned") &
          PID_NOVNC=$!

          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" \
            xfce4 xfce4-terminal dbus-x11 x11-utils x11-xserver-utils xfonts-base net-tools \
            libnss3 libatk-bridge2.0-0 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 libasound2t64

          echo "✅ XFCE + chromium runtime libs installed"

          wait $PID_VNC && sudo dpkg -i ~/cached-debs/turbovnc_2.2.5_amd64.deb
          echo "✅ TurboVNC installed"

          wait $PID_NOVNC
          echo "✅ noVNC ready"

      - name: Configure VNC Server
        run: |
          export PATH=$PATH:/opt/TurboVNC/bin
          mkdir -p ~/.vnc
          echo "${VNC_PASSWORD}" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd

          cat > ~/.vnc/xstartup.turbovnc << 'EOF'
          #!/bin/bash
          export NO_AT_BRIDGE=1
          export SESSION_MANAGER=""
          dbus-launch /usr/bin/startxfce4 &
          EOF
          chmod +x ~/.vnc/xstartup.turbovnc
          echo "✅ VNC configured (password: botxbyte123)"

      - name: Start VNC Server
        run: |
          export PATH=$PATH:/opt/TurboVNC/bin
          vncserver :1 -geometry 1920x1080 -depth 24 -rfbport $VNC_PORT 2>&1 | tee /tmp/vnc-start.log
          for i in $(seq 1 15); do
            if pgrep -f "Xvnc.*:1" > /dev/null; then
              echo "✅ TurboVNC started in ${i}s on port $VNC_PORT"; exit 0
            fi
            sleep 1
          done
          echo "❌ Failed to start VNC server"; cat /tmp/vnc-start.log; exit 1

      - name: Start noVNC (Web VNC)
        run: |
          cd ~/noVNC
          ./utils/novnc_proxy --vnc localhost:$VNC_PORT --listen $NOVNC_PORT > /tmp/novnc.log 2>&1 &
          for i in $(seq 1 10); do
            if netstat -tuln | grep :$NOVNC_PORT > /dev/null; then
              echo "✅ noVNC started in ${i}s on port $NOVNC_PORT"; exit 0
            fi
            sleep 1
          done
          echo "❌ noVNC failed to start"; cat /tmp/novnc.log; exit 1

      - name: Install cloudflared
        run: |
          wget -q -O /tmp/cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i /tmp/cloudflared.deb
          cloudflared --version
          echo "✅ cloudflared installed"

      - name: Start Cloudflare Quick Tunnel
        id: tunnel
        run: |
          cloudflared tunnel --no-autoupdate --url http://localhost:$NOVNC_PORT > /tmp/tunnel.log 2>&1 &
          TUNNEL_URL=""
          for i in $(seq 1 30); do
            TUNNEL_URL=$(grep -oE 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' /tmp/tunnel.log | head -1)
            if [ -n "$TUNNEL_URL" ]; then break; fi
            sleep 2
          done
          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Failed to obtain tunnel URL"; cat /tmp/tunnel.log; exit 1
          fi
          echo "tunnel_url=$TUNNEL_URL" >> $GITHUB_OUTPUT
          echo "✅ Cloudflare tunnel ready: $TUNNEL_URL"

      - name: Setup vendored ungoogled-chromium
        timeout-minutes: 6
        run: |
          # vendor/ is gitignored, so a fresh clone has no browser. setup_vendor.sh
          # downloads ungoogled-chromium into vendor/ — maps_checker.py then
          # auto-discovers it. (No cf-autoclick / master profile — Maps has no
          # Cloudflare Turnstile.)
          cd "$MAP_DIR"
          bash tools/setup_vendor.sh
          test -x vendor/ungoogled-chromium/chrome \
            || { echo "❌ vendor/ungoogled-chromium/chrome missing"; exit 1; }
          echo "✅ Vendor setup complete"

      - name: Start Maps Checker
        run: |
          echo "Starting maps_checker.py (workers=${MAP_WORKERS}, no proxy)..."
          export DISPLAY=:1
          export NO_AT_BRIDGE=1
          cd "$MAP_DIR"
          python3 -m venv .venv
          source .venv/bin/activate
          pip install --no-cache-dir -r requirements.txt
          nohup python3 maps_checker.py --workers "${MAP_WORKERS}" --no-proxy > /tmp/maps-checker.log 2>&1 &
          CHECKER_PID=$!
          echo "  Checker PID: $CHECKER_PID"
          sleep 5
          if kill -0 $CHECKER_PID 2>/dev/null; then
            echo "✅ Maps checker started (PID: $CHECKER_PID)"
          else
            echo "❌ Maps checker failed to start"; cat /tmp/maps-checker.log; exit 1
          fi

      - name: Display Connection Info
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║              🎉 MAPS CHECKER VNC IS RUNNING! 🎉             ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "🌐 VNC Access URL: ${{ steps.tunnel.outputs.tunnel_url }}/vnc.html"
          echo "🔑 Password: botxbyte123"
          echo ""
          echo "🐍 maps_checker.py running with: --workers ${MAP_WORKERS} --no-proxy"
          echo ""

      - name: Keep Session Alive
        run: |
          export PATH=$PATH:/opt/TurboVNC/bin
          set +e
          while true; do
            echo "🌐 VNC: ${{ steps.tunnel.outputs.tunnel_url }}/vnc.html | Password: botxbyte123"

            if ! pgrep -f "Xvnc.*:1" > /dev/null; then
              echo "❌ VNC stopped! Restarting..."
              vncserver :1 -geometry 1920x1080 -depth 24 -rfbport $VNC_PORT
              sleep 3
            fi

            if ! pgrep -x "cloudflared" > /dev/null; then
              echo "❌ Tunnel stopped! Restarting..."
              cloudflared tunnel --no-autoupdate --url http://localhost:$NOVNC_PORT > /tmp/tunnel.log 2>&1 &
              sleep 5
            fi

            if ! pgrep -f "maps_checker.py" > /dev/null; then
              echo "⚠️ Maps checker stopped! Restarting..."
              export DISPLAY=:1
              export NO_AT_BRIDGE=1
              cd "$MAP_DIR"
              source .venv/bin/activate
              nohup python3 maps_checker.py --workers "${MAP_WORKERS}" --no-proxy > /tmp/maps-checker.log 2>&1 &
              sleep 3
            fi

            sleep 30
          done

      - name: Cleanup VNC
        if: always()
        timeout-minutes: 1
        run: |
          export PATH=$PATH:/opt/TurboVNC/bin
          pkill -f "maps_checker.py" || true
          pkill -x cloudflared || true
          vncserver -kill :1 || true
          echo "✅ Cleanup complete"
